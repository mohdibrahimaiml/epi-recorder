# Production override — adds Caddy for automatic HTTPS.
#
# Usage:
#   cp .env.example .env          # fill in your settings
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# The gateway is no longer exposed directly on 8787; Caddy handles TLS
# termination on 80/443 and forwards internally to gateway:8787.

services:
  gateway:
    # Remove direct port binding — Caddy is the only public entry point.
    ports: !reset []

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
