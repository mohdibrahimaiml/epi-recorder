name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-gate:
    name: Full test, build, and wheel audit
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          pip install -e ".[dev]"
          pip install build twine

      - name: Run release gate
        run: |
          .\scripts\release-gate.ps1 -Python python
        shell: powershell
