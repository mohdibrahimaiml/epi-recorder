<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPI Case Viewer __EPI_VERSION__</title>
<script id="epi-view-context" type="application/json">{}</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0d1117;
  color: #e6edf3;
  font-family: monospace;
  font-size: 13px;
  line-height: 1.6;
}

#viewer {
  max-width: 900px;
  margin: 0 auto;
  padding: 28px 20px 48px;
}

.section {
  border-top: 1px solid #222;
  padding: 16px 0;
}

.section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #7d8590;
  margin-bottom: 12px;
}

.field {
  display: flex;
  gap: 12px;
  padding: 3px 0;
}

.field-key {
  color: #7d8590;
  min-width: 140px;
  flex-shrink: 0;
}

.field-val {
  color: #e6edf3;
  font-family: monospace;
  word-break: break-all;
}

.field-val.good { color: #3fb950; }
.field-val.bad  { color: #f85149; }
.field-val.warn { color: #d29922; }

pre {
  font-family: monospace;
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-word;
  background: #090c10;
  border: 1px solid #1c2028;
  padding: 10px 12px;
  line-height: 1.5;
  color: #c9d1d9;
  margin-top: 4px;
  max-height: 280px;
  overflow-y: auto;
}

.fault-entry {
  border-left: 3px solid #f85149;
  padding: 6px 10px;
  margin-bottom: 8px;
  background: #130a0a;
}

.fault-kind {
  font-size: 10px;
  color: #f85149;
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 2px;
  letter-spacing: .06em;
}

.fault-text { color: #e6edf3; }

.no-faults { color: #3fb950; }
.no-data   { color: #7d8590; font-style: italic; }

.layer { margin-bottom: 18px; }

.layer-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #58a6ff;
  border-bottom: 1px solid #1c2028;
  padding-bottom: 4px;
  margin-bottom: 8px;
}

.step {
  padding: 8px 0;
  border-bottom: 1px solid #151b22;
}

.step:last-child { border-bottom: none; }

.step-header {
  font-size: 11px;
  color: #7d8590;
  margin-bottom: 2px;
}

.step-kind {
  color: #8b949e;
  font-weight: 700;
}

.step-summary { color: #e6edf3; }

details { margin-top: 4px; }

details summary {
  font-size: 11px;
  color: #484f58;
  cursor: pointer;
  user-select: none;
}

details summary:hover { color: #8b949e; }

.fatal {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.fatal-box {
  border-left: 4px solid #f85149;
  padding: 16px 20px;
  background: #130a0a;
  max-width: 480px;
}

.fatal-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #f85149;
  margin-bottom: 8px;
}

.fatal-msg { color: #e6edf3; }

#artifact-title {
  font-size: 16px;
  font-weight: 700;
  color: #e6edf3;
  margin-bottom: 10px;
  letter-spacing: -.01em;
}
</style>
</head>
<body>

<div id="viewer" hidden>

  <!-- HEADER: goal, timestamp, command -->
  <section id="header" style="border-top: none; padding-top: 4px;">
    <div id="artifact-title"></div>
    <div id="header-fields"></div>
  </section>

  <!-- TRUST: payload hash, signature -->
  <section id="trust" class="section">
    <div class="section-title">Trust</div>
    <div id="trust-body"></div>
  </section>

  <!-- FAULTS: errors + fails from steps, top of page -->
  <section id="faults" class="section">
    <div class="section-title">Faults</div>
    <div id="faults-body"></div>
  </section>

  <!-- SUMMARY: step counts, decision, key outputs -->
  <section id="summary" class="section">
    <div class="section-title">Summary</div>
    <div id="summary-body"></div>
  </section>

  <!-- EXECUTION: steps grouped into layers -->
  <section id="execution" class="section">
    <div class="section-title">Execution</div>
    <div id="execution-body"></div>
  </section>

  <!-- POLICY: only when policy or policy_evaluation exists -->
  <section id="policy" class="section">
    <div class="section-title">Policy Evaluation</div>
    <div id="policy-body"></div>
  </section>

  <!-- REVIEW: only when review exists -->
  <section id="review" class="section">
    <div class="section-title">Human Review</div>
    <div id="review-body"></div>
  </section>

  <!-- ENVIRONMENT: key-value pairs -->
  <section id="environment" class="section">
    <div class="section-title">Environment Snapshot</div>
    <div id="environment-body"></div>
  </section>

</div><!-- /viewer -->

<script>
(function () {
  'use strict';

  /* ── Utilities ─────────────────────────────────────────────────────────── */
  function esc(v) {
    if (v == null) return '';
    const d = document.createElement('div');
    d.textContent = String(v);
    return d.innerHTML;
  }

  function fmtDate(v) {
    if (!v) return '—';
    const d = new Date(v);
    return isNaN(d.getTime()) ? String(v) : d.toLocaleString();
  }

  function fmtTime(v) {
    if (!v) return '';
    const d = new Date(v);
    return isNaN(d.getTime()) ? '' : d.toLocaleTimeString();
  }

  function trunc(t, n) {
    t = t == null ? '' : String(t);
    return t.length <= n ? t : t.slice(0, n - 1) + '\u2026';
  }

  function flat(v) {
    if (v == null) return '';
    if (typeof v === 'string') return v;
    try { return JSON.stringify(v); } catch { return String(v); }
  }

  function field(key, val, cls) {
    return '<div class="field">'
      + '<span class="field-key">' + esc(key) + '</span>'
      + '<span class="field-val' + (cls ? ' ' + cls : '') + '">' + esc(val) + '</span>'
      + '</div>';
  }

  /* ── Data loaders ──────────────────────────────────────────────────────── */
  function loadEmbeddedData() {
    const el = document.getElementById('epi-data');
    if (!el) return null;
    try {
      return JSON.parse(el.textContent);
    } catch {
      return null;
    }
  }

  function loadJsonScript(id) {
    const n = document.getElementById(id);
    if (!n) return null;
    try { return JSON.parse(n.textContent || '{}'); } catch { return null; }
  }

  /* ── Step helpers ──────────────────────────────────────────────────────── */
  function stepSummary(s) {
    const c = s.content || {}, k = s.kind || '';
    if (k.includes('llm.request'))
      return 'Model: ' + (c.model || 'unknown') + ' · ' + (Array.isArray(c.messages) ? c.messages.length : 0) + ' msg';
    if (k.includes('llm.response'))
      return trunc(c.text || c.content || (c.choices && c.choices[0] && c.choices[0].message && c.choices[0].message.content) || 'Response recorded', 160);
    if (k.includes('tool.call') || k.includes('tool.start'))
      return trunc(flat(c.input || c.tool_input || c), 160);
    if (k.includes('tool.response') || k.includes('tool.end'))
      return trunc(flat(c.output || c.result || c), 160);
    if (k.includes('tool.error'))
      return 'Error: ' + trunc(c.error || flat(c), 160);
    if (k.includes('agent.message'))
      return trunc((c.role || 'message') + ': ' + flat(c.content), 160);
    if (k.includes('agent.decision'))
      return 'Decision: ' + (c.decision || '?') + (c.confidence != null ? ' · ' + c.confidence : '');
    if (k.includes('agent.run.error'))
      return 'Error: ' + trunc(c.error_message || c.error || flat(c), 160);
    if (k.includes('validation.pass'))   return 'Validation passed';
    if (k.includes('validation.fail'))   return 'Failed: ' + trunc(c.validator_name || c.rule || flat(c), 160);
    if (k.includes('validation.corrected')) return 'Corrected: ' + trunc(c.validator_name || c.rule || flat(c), 160);
    if (k.includes('file.write'))        return 'File: ' + trunc(c.path || c.filename || flat(c), 160);
    if (k.includes('shell.command'))     return trunc(c.command || flat(c), 160);
    if (k.includes('security.redaction')) return 'Redacted ' + (c.field || 'field') + ' (' + (c.rule || 'pattern') + ')';
    if (k.includes('http.request'))      return (c.method || 'GET') + ' ' + trunc(c.url || '', 140);
    if (k.includes('http.response'))     return 'HTTP ' + (c.status_code || '?') + ' ' + trunc(c.url || '', 140);
    if (k.includes('session.start'))     return 'Workflow: ' + (c.workflow_name || c.goal || 'Started');
    if (k.includes('session.end'))       return 'Finished' + (c.duration_seconds != null ? ' · ' + c.duration_seconds.toFixed(2) + ' s' : '');
    return trunc(flat(c), 160) || 'Recorded step';
  }

  function renderStep(s) {
    var rawJson = '';
    try { rawJson = JSON.stringify(s, null, 2); } catch { rawJson = String(s); }
    return '<div class="step">'
      + '<div class="step-header"><span class="step-kind">[' + esc((s.kind || 'unknown').toUpperCase()) + ']</span>'
      + (s.timestamp ? ' ' + esc(fmtTime(s.timestamp)) : '')
      + '</div>'
      + '<div class="step-summary">' + esc(stepSummary(s)) + '</div>'
      + '<details><summary>Details</summary><pre>' + esc(rawJson) + '</pre></details>'
      + '</div>';
  }

  /* ── Step grouping ─────────────────────────────────────────────────────── */
  function groupSteps(steps) {
    var groups = { LLM: [], TOOLS: [], VALIDATION: [], ERRORS: [], DECISION: [], OTHER: [] };
    steps.forEach(function (s) {
      var k = s.kind || '';
      if (k.includes('error'))              groups.ERRORS.push(s);
      else if (k.includes('decision'))      groups.DECISION.push(s);
      else if (k.startsWith('llm'))         groups.LLM.push(s);
      else if (k.startsWith('tool'))        groups.TOOLS.push(s);
      else if (k.startsWith('validation'))  groups.VALIDATION.push(s);
      else                                  groups.OTHER.push(s);
    });
    return groups;
  }

  /* ── Render ────────────────────────────────────────────────────────────── */
  function render(data) {
    var m      = data.manifest || {};
    var steps  = Array.isArray(data.steps) ? data.steps : [];
    var anal   = data.analysis || null;
    var policy = data.policy || null;
    var pe     = data.policy_evaluation || null;
    var review = data.review || null;
    var env    = data.environment || null;
    var ctx    = loadJsonScript('epi-view-context') || {};

    /* ── HEADER ──────────────────────────────────────────────────────────── */
    var goal = m.goal || m.workflow_id || 'EPI Case File';
    document.title = 'EPI Case Viewer · ' + trunc(goal, 64);

    document.getElementById('artifact-title').textContent = goal;

    var headerHtml = '';
    if (m.created_at)  headerHtml += field('Recorded', fmtDate(m.created_at));
    if (m.cli_command) headerHtml += field('Command', m.cli_command);
    if (m.workflow_id) headerHtml += field('Workflow ID', m.workflow_id);
    if (m.spec_version) headerHtml += field('Spec version', m.spec_version);
    document.getElementById('header-fields').innerHTML = headerHtml;

    /* ── TRUST ───────────────────────────────────────────────────────────── */
    var t = m.trust || {};
    var payloadHash = t.payload_hash || null;

    var trustStatus, trustCls;
    if (ctx.integrity_ok === false || ctx.signature_valid === false) {
      trustStatus = 'TAMPERED — do not use'; trustCls = 'bad';
    } else if (ctx.signature_valid === true && ctx.integrity_ok === true) {
      trustStatus = 'VERIFIED — signature valid'; trustCls = 'good';
    } else if (!m.signature) {
      trustStatus = 'UNVERIFIED — no signature present'; trustCls = 'warn';
    } else {
      trustStatus = 'UNVERIFIED — signature not checked in browser'; trustCls = 'warn';
    }

    var trustHtml = field('Status', trustStatus, trustCls);
    if (payloadHash)    trustHtml += field('Payload hash', payloadHash);
    if (m.signature)    trustHtml += field('Signature', trunc(m.signature, 72));
    if (m.public_key)   trustHtml += field('Public key', trunc(m.public_key, 72));
    if (m.file_manifest) {
      var n = Object.keys(m.file_manifest).length;
      trustHtml += field('Sealed files', n + ' file' + (n === 1 ? '' : 's'), 'good');
    }
    document.getElementById('trust-body').innerHTML = trustHtml;

    /* ── FAULTS ──────────────────────────────────────────────────────────── */
    var faultSteps = steps.filter(function (s) {
      var k = (s.kind || '').toLowerCase();
      return k.includes('error') || k.includes('fail');
    });

    var analysisFaults = [];
    if (anal) {
      if (anal.primary_fault) analysisFaults.push(anal.primary_fault);
      (anal.secondary_flags || []).forEach(function (f) { analysisFaults.push(f); });
      (anal.all_faults || []).forEach(function (f) {
        var key = (f.fault_type || '') + '|' + (f.step_index != null ? f.step_index : '');
        var exists = analysisFaults.some(function (x) {
          return (x.fault_type || '') + '|' + (x.step_index != null ? x.step_index : '') === key;
        });
        if (!exists) analysisFaults.push(f);
      });
    }

    var faultsHtml = '';
    if (faultSteps.length === 0 && analysisFaults.length === 0) {
      faultsHtml = '<span class="no-faults">No faults detected</span>';
    } else {
      faultSteps.forEach(function (s) {
        faultsHtml += '<div class="fault-entry">'
          + '<div class="fault-kind">[' + esc(s.kind || 'error') + ']</div>'
          + '<div class="fault-text">' + esc(stepSummary(s)) + '</div>'
          + '</div>';
      });
      analysisFaults.forEach(function (f) {
        faultsHtml += '<div class="fault-entry">'
          + '<div class="fault-kind">' + esc((f.severity || 'fault').toUpperCase()) + ' — ' + esc(f.fault_type || f.category || 'Fault') + '</div>'
          + '<div class="fault-text">' + esc(f.plain_english || '') + '</div>'
          + '</div>';
      });
    }
    document.getElementById('faults-body').innerHTML = faultsHtml;

    /* ── SUMMARY ─────────────────────────────────────────────────────────── */
    var llmN  = steps.filter(function (s) { return (s.kind || '').startsWith('llm'); }).length;
    var toolN = steps.filter(function (s) { return (s.kind || '').startsWith('tool'); }).length;
    var errN  = steps.filter(function (s) { return (s.kind || '').includes('error'); }).length;

    var summaryHtml = field('Total steps', String(steps.length));
    if (llmN)  summaryHtml += field('LLM steps',   String(llmN));
    if (toolN) summaryHtml += field('Tool steps',  String(toolN));
    if (errN)  summaryHtml += field('Error steps', String(errN), 'bad');

    var decisionStep = steps.find(function (s) { return (s.kind || '').includes('decision'); });
    if (decisionStep) {
      var dc = decisionStep.content || {};
      summaryHtml += field('Decision', dc.decision || flat(dc));
    }

    if (anal) {
      if (anal.headline)      summaryHtml += field('Analysis', anal.headline);
      if (anal.coverage_pct != null) summaryHtml += field('Coverage', anal.coverage_pct + '%');
      if (anal.fault_detected != null)
        summaryHtml += field('Fault detected', anal.fault_detected ? 'Yes' : 'No', anal.fault_detected ? 'bad' : 'good');
    }
    document.getElementById('summary-body').innerHTML = summaryHtml;

    /* ── EXECUTION ───────────────────────────────────────────────────────── */
    var groups = groupSteps(steps);
    var execHtml = '';
    var layerOrder = ['LLM', 'TOOLS', 'VALIDATION', 'ERRORS', 'DECISION', 'OTHER'];
    layerOrder.forEach(function (name) {
      var ls = groups[name];
      if (!ls || !ls.length) return;
      execHtml += '<div class="layer">'
        + '<div class="layer-title">' + esc(name) + ' (' + ls.length + ')</div>'
        + ls.map(renderStep).join('')
        + '</div>';
    });
    if (!steps.length) execHtml = '<span class="no-data">No steps recorded</span>';
    document.getElementById('execution-body').innerHTML = execHtml;

    /* ── POLICY ──────────────────────────────────────────────────────────── */
    if (policy || pe) {
      var policyHtml = '';
      if (pe && pe.baseline) policyHtml += field('Type', 'Baseline evaluation');
      if (pe && pe.policy_id) policyHtml += field('Policy ID', pe.policy_id);
      if (pe && pe.note) policyHtml += field('Note', pe.note);
      if (policy) {
        if (!pe || !pe.policy_id) policyHtml += field('Policy ID', policy.policy_id || '—');
        policyHtml += field('Version', policy.version || '—');
        policyHtml += field('Rules', String((policy.rules || []).length));
        if (policy.violation_count) policyHtml += field('Violations', String(policy.violation_count), 'bad');
      }
      if (pe) {
        var status = pe.controls_failed > 0 ? 'violation' : 'compliant';
        policyHtml += field('Status', status, status === 'compliant' ? 'good' : 'bad');
        policyHtml += field('Controls evaluated', String(pe.controls_evaluated || 0));
        policyHtml += field('Controls failed', String(pe.controls_failed || 0), pe.controls_failed > 0 ? 'bad' : 'good');
        policyHtml += field('Review required', pe.artifact_review_required ? 'Yes' : 'No', pe.artifact_review_required ? 'warn' : '');
        (pe.results || []).forEach(function (r) {
          var rs = r.status || r.outcome || '?';
          var rc = rs === 'pass' || rs === 'compliant' ? 'good' : rs === 'fail' || rs === 'violation' ? 'bad' : '';
          policyHtml += field(r.control_id || r.rule_id || 'Rule', rs, rc);
        });
      }
      document.getElementById('policy-body').innerHTML = policyHtml;
    } else {
      document.getElementById('policy').hidden = true;
    }

    /* ── REVIEW ──────────────────────────────────────────────────────────── */
    if (review) {
      var revEntries = Array.isArray(review.reviews) ? review.reviews : [];
      var rev = revEntries[0] || review;
      var reviewHtml = '';
      if (rev.reviewer)    reviewHtml += field('Reviewer', rev.reviewer);
      if (rev.outcome)     reviewHtml += field('Outcome', rev.outcome);
      if (rev.reviewed_at) reviewHtml += field('Reviewed at', fmtDate(rev.reviewed_at));
      if (rev.notes)       reviewHtml += field('Notes', rev.notes);
      if (!reviewHtml) reviewHtml = '<span class="no-data">Review record present but empty</span>';
      document.getElementById('review-body').innerHTML = reviewHtml;
    } else {
      document.getElementById('review').hidden = true;
    }

    /* ── ENVIRONMENT ─────────────────────────────────────────────────────── */
    if (env && typeof env === 'object' && Object.keys(env).length) {
      var envHtml = '';
      Object.entries(env).forEach(function (entry) {
        var k = entry[0], v = entry[1];
        envHtml += field(k, typeof v === 'object' ? JSON.stringify(v) : String(v));
      });
      document.getElementById('environment-body').innerHTML = envHtml;
    } else {
      document.getElementById('environment').hidden = true;
    }

    document.getElementById('viewer').hidden = false;
  }

  /* ── Boot ──────────────────────────────────────────────────────────────── */
  function boot() {
    var data = loadEmbeddedData();
    if (!data) {
      document.body.innerHTML =
        '<div class="fatal"><div class="fatal-box">'
        + '<div class="fatal-label">Artifact error</div>'
        + '<div class="fatal-msg">Invalid EPI artifact: embedded data missing or corrupted</div>'
        + '</div></div>';
    } else {
      render(data);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
</body>
</html>
