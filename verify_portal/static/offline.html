<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — EPI Labs</title>
    <style>
        :root { --bg:#0f1115; --surface:#181b21; --text:#e6e6e6; --accent:#4fc3f7; }
        body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; text-align:center; }
        .card { max-width:420px; padding:2rem; background:var(--surface); border-radius:16px; }
        h1 { margin:0 0 0.5rem; font-size:1.5rem; }
        p { margin:0 0 1.25rem; line-height:1.5; opacity:.85; }
        a { color:var(--accent); text-decoration:none; font-weight:600; }
        a:hover { text-decoration:underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>You’re offline</h1>
        <p>EPI Labs needs an internet connection for verification and ledger lookups. Check your connection and try again.</p>
        <p><a href="/">Return home</a></p>
    </div>
</body>
</html>
