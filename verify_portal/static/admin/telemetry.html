<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPI Telemetry Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }
    header { padding: 2rem; border-bottom: 1px solid #334155; }
    h1 { margin: 0; font-size: 1.75rem; }
    p.subtitle { margin: 0.5rem 0 0; color: var(--muted); }
    .container { padding: 2rem; max-width: 1400px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .card { background: var(--card); border-radius: 0.75rem; padding: 1.25rem; }
    .card h3 { margin: 0 0 0.5rem; font-size: 0.875rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .card .value { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .card .detail { margin-top: 0.5rem; font-size: 0.875rem; color: var(--muted); }
    .chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 1.5rem; }
    .chart-card { background: var(--card); border-radius: 0.75rem; padding: 1.25rem; }
    .chart-card h3 { margin: 0 0 1rem; font-size: 1rem; }
    .lists { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
    ul { margin: 0; padding-left: 1.25rem; color: var(--muted); }
    li { margin-bottom: 0.25rem; }
    .key-form { display: flex; gap: 0.5rem; margin-top: 1rem; }
    input[type="password"] { flex: 1; padding: 0.5rem 0.75rem; border-radius: 0.375rem; border: 1px solid #334155; background: #0f172a; color: var(--text); }
    button { padding: 0.5rem 1rem; border: none; border-radius: 0.375rem; background: var(--accent); color: #0f172a; font-weight: 600; cursor: pointer; }
    button:hover { opacity: 0.9; }
    .error { color: #f87171; margin-top: 1rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <h1>EPI Telemetry Dashboard</h1>
    <p class="subtitle">Privacy-first usage intelligence. Anonymous by default.</p>
    <div class="key-form">
      <input id="adminKey" type="password" placeholder="Admin API key" />
      <button id="loadBtn">Load Metrics</button>
    </div>
    <div id="error" class="error hidden"></div>
  </header>

  <div class="container">
    <div id="loading" class="hidden">Loading...</div>

    <div id="dashboard" class="hidden">
      <div class="grid">
        <div class="card"><h3>Total Installs</h3><div class="value" id="totalInstalls">-</div></div>
        <div class="card"><h3>Daily Active</h3><div class="value" id="dau">-</div></div>
        <div class="card"><h3>Weekly Active</h3><div class="value" id="wau">-</div></div>
        <div class="card"><h3>Monthly Active</h3><div class="value" id="mau">-</div></div>
        <div class="card"><h3>Returning Users</h3><div class="value" id="returning">-</div></div>
        <div class="card"><h3>Pilot Signups</h3><div class="value" id="pilotSignups">-</div></div>
      </div>

      <div class="chart-grid">
        <div class="chart-card"><h3>Command Usage</h3><canvas id="commandsChart"></canvas></div>
        <div class="chart-card"><h3>Version Distribution</h3><canvas id="versionsChart"></canvas></div>
      </div>

      <div class="lists">
        <div class="chart-card"><h3>Email Domains Detected</h3><ul id="domainsList"></ul></div>
        <div class="chart-card"><h3>GitHub Organizations Detected</h3><ul id="githubsList"></ul></div>
      </div>
    </div>
  </div>

  <script>
    let charts = [];

    function destroyCharts() {
      charts.forEach(c => c.destroy());
      charts = [];
    }

    function renderBar(canvasId, labels, data, label) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      charts.push(new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{ label, data, backgroundColor: '#38bdf8', borderRadius: 4 }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }, x: { ticks: { color: '#94a3b8' }, grid: { display: false } } }
        }
      }));
    }

    async function loadMetrics() {
      const key = document.getElementById('adminKey').value.trim();
      const errorEl = document.getElementById('error');
      const dashboard = document.getElementById('dashboard');
      const loading = document.getElementById('loading');
      errorEl.classList.add('hidden');
      dashboard.classList.add('hidden');
      if (!key) { errorEl.textContent = 'Admin key is required'; errorEl.classList.remove('hidden'); return; }

      loading.classList.remove('hidden');
      try {
        const res = await fetch('/api/admin/telemetry/metrics', { headers: { 'X-Admin-Key': key } });
        if (!res.ok) throw new Error((await res.json()).detail || `HTTP ${res.status}`);
        const data = await res.json();
        loading.classList.add('hidden');
        dashboard.classList.remove('hidden');

        document.getElementById('totalInstalls').textContent = data.total_installs;
        document.getElementById('dau').textContent = data.active_installs.dau;
        document.getElementById('wau').textContent = data.active_installs.wau;
        document.getElementById('mau').textContent = data.active_installs.mau;
        document.getElementById('returning').textContent = data.returning_users;
        document.getElementById('pilotSignups').textContent = data.pilot_signups;

        destroyCharts();
        const commands = data.top_commands || {};
        renderBar('commandsChart', Object.keys(commands), Object.values(commands), 'Events');
        const versions = data.version_distribution || {};
        renderBar('versionsChart', Object.keys(versions), Object.values(versions), 'Events');

        const domains = data.organizations_detected?.email_domains || [];
        document.getElementById('domainsList').innerHTML = domains.length ? domains.map(d => `<li>${d}</li>`).join('') : '<li>None yet</li>';
        const githubs = data.organizations_detected?.github_orgs || [];
        document.getElementById('githubsList').innerHTML = githubs.length ? githubs.map(g => `<li>${g}</li>`).join('') : '<li>None yet</li>';
      } catch (e) {
        loading.classList.add('hidden');
        errorEl.textContent = e.message;
        errorEl.classList.remove('hidden');
      }
    }

    document.getElementById('loadBtn').addEventListener('click', loadMetrics);
    document.getElementById('adminKey').addEventListener('keydown', e => { if (e.key === 'Enter') loadMetrics(); });
  </script>
</body>
</html>
