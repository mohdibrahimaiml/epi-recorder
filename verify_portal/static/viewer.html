<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to EPI Viewer</title>
    <meta http-equiv="refresh" content="0; url=viewer/">
    <link rel="canonical" href="https://epilabs.org/viewer/">
    <script>
        window.location.replace("viewer/");
    </script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #0b1220;
            color: #f8fafc;
            font-family: "Inter", "Segoe UI", sans-serif;
        }

        a {
            color: #67e8f9;
        }

        .card {
            width: min(520px, calc(100% - 32px));
            padding: 24px;
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.24);
            box-shadow: 0 24px 48px rgba(2, 6, 23, 0.45);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Opening the EPI Viewer</h1>
        <p>You are being redirected to the new Decision Ops viewer.</p>
        <p><a href="viewer/">Open the viewer now</a></p>
    </div>
</body>
</html>
