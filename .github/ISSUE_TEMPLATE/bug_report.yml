name: Bug Report
description: Report a bug in EPI Recorder
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this issue.
        If you can attach a `.epi` file, do that first — EPI works best as a portable bug report artifact for AI runs.
        The combination of a short description plus one `.epi` file is usually enough for us to reproduce the problem quickly.

  - type: input
    id: version
    attributes:
      label: EPI Recorder Version
      description: What version of EPI Recorder are you using?
      placeholder: "2.1.3"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: What version of Python are you using?
      placeholder: "3.11.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run command '...'
        2. Use code '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Messages / Logs
      description: Please paste any relevant error messages or logs
      render: shell

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: epi_artifact
    attributes:
      label: Portable repro (.epi) (strongly recommended)
      description: |
        If the issue involves recording, verification, viewing, CI, or a framework integration, please attach the `.epi` file.
        You can drag and drop it into this text box, or paste the output of `epi verify <file.epi>`.
        Good sources include `epi demo`, `epi run`, `pytest --epi`, or a framework wrapper.
        This is the single most useful thing for us to reproduce the issue.
      placeholder: |
        Paste `epi verify` output here, or attach the .epi file by dragging it in.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
