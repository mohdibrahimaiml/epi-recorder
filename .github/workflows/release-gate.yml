name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-gate:
    name: Full test, build, and wheel audit
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          pip install -e ".[dev]"
          pip install build twine

      - name: Run release gate (Windows)
        if: runner.os == 'Windows'
        run: |
          .\scripts\release-gate.ps1 -Python python
        shell: powershell

      - name: Run release gate (Linux)
        if: runner.os == 'Linux'
        run: bash scripts/release-gate.sh python
