name: Release Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-gate:
    name: Full test, build, and wheel audit
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies only (NOT the package itself)
        run: |
          python -m pip install --upgrade pip setuptools wheel build twine
          pip install \
            "pydantic>=2.0.0,<=2.12.3" \
            "cryptography>=41.0.0,<44" \
            "cbor2>=5.6.0" \
            "typer>=0.16.0,<0.26.0" \
            "click>=8.1.0,<9.0.0" \
            "rich>=13.0.0,<14" \
            "pytest>=8.0.0" \
            "pytest-asyncio>=0.23.0" \
            "pytest-cov>=4.1.0" \
            "pytest-timeout>=2.3.1" \
            "httpx>=0.27.0" \
            "fastapi>=0.111.0,<1" \
            "uvicorn>=0.30.0,<1" \
            "pandas>=1.5.0" \
            "litellm>=1.0.0" \
            "langchain-core>=0.2.0" \
            "opentelemetry-api>=1.25.0" \
            "opentelemetry-sdk>=1.25.0" \
            "wrapt>=1.16.0" \
            "anyio"

      - name: Run release gate (Windows)
        if: runner.os == 'Windows'
        run: |
          .\scripts\release-gate.ps1 -Python python
        shell: powershell

      - name: Run release gate (Linux)
        if: runner.os == 'Linux'
        run: bash scripts/release-gate.sh python
