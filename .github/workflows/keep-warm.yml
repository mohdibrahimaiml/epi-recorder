name: Keep Render Warm

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: curl -sf https://epi-verify-portal.onrender.com/health || echo "Render asleep — waking up"
      - name: Ping Render auth endpoint (warms Python process)
        run: curl -sf https://epi-verify-portal.onrender.com/api/plan/features || echo "Warm-up hit"
