name: Keep Render Warm

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (288/day = ~2.4 hrs/month from 750hr quota)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: curl -sf https://epi-verify-portal.onrender.com/health > /dev/null || echo "Render waking up..."
