<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{ title }} — EPI Labs</title>
<meta name="description" content="{{ description }}">
<link rel="icon" type="image/x-icon" href="../../assets/epi.ico">
<link rel="stylesheet" href="../../css/epi.css">
</head>
<body>
<nav id="nav"><div class="nav-inner"><a href="/" class="nav-logo"><img src="../../assets/logo.png" alt="EPI Labs"></a>
<ul class="nav-links" id="navLinks">

<li><a href="/blog/" class="active">Blog</a></li>
<li><a href="https://github.com/mohdibrahimaiml/epi-recorder" target="_blank">GitHub</a></li>

</div></nav>
