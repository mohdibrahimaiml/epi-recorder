# Render Blueprint — Free Tier Deployment
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: epi-verify-portal
    runtime: python
    plan: free
    buildCommand: pip install -e ".[gateway]"
    startCommand: python -m verify_portal.main
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: PORT
        value: 10000
      - key: EPI_ATTESTATION_PRIVATE_KEY
        sync: false  # Set manually in Render dashboard — never commit secrets
